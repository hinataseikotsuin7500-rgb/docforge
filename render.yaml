services:
  - type: web
    name: docforge
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PRICE_SOLO
        sync: false
      - key: STRIPE_PRICE_TEAM
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
