<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DocForge — ログイン / 新規登録</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
    }
    .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; justify-content: center; }
    .logo h1 { font-size: 22px; color: #58a6ff; }
    .tabs { display: flex; border-bottom: 1px solid #21262d; margin-bottom: 24px; }
    .tab {
      flex: 1; padding: 10px; text-align: center; cursor: pointer;
      color: #8b949e; font-size: 14px; font-weight: 600;
      border-bottom: 2px solid transparent; transition: all 0.2s;
    }
    .tab.active { color: #58a6ff; border-bottom-color: #58a6ff; }
    label { display: block; font-size: 13px; color: #8b949e; margin-bottom: 6px; }
    input {
      width: 100%; background: #0d1117; color: #e6edf3;
      border: 1px solid #30363d; border-radius: 6px;
      padding: 10px 12px; font-size: 14px; margin-bottom: 16px;
    }
    input:focus { outline: none; border-color: #58a6ff; }
    button[type=submit] {
      width: 100%; background: #238636; color: #fff; border: none;
      border-radius: 6px; padding: 11px; font-size: 14px;
      font-weight: 600; cursor: pointer; transition: background 0.2s;
    }
    button[type=submit]:hover { background: #2ea043; }
    button[type=submit]:disabled { background: #21262d; color: #8b949e; cursor: not-allowed; }
    .error { color: #f85149; font-size: 13px; margin-bottom: 12px; display: none; }
    .note { font-size: 12px; color: #484f58; text-align: center; margin-top: 16px; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
      <rect width="24" height="24" rx="6" fill="#1f6feb"/>
      <path d="M6 8h12M6 12h8M6 16h10" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
    </svg>
    <h1>DocForge</h1>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('login')">ログイン</div>
    <div class="tab" onclick="switchTab('signup')">新規登録</div>
  </div>

  <div id="error" class="error"></div>

  <form onsubmit="handleSubmit(event)">
    <label>メールアドレス</label>
    <input type="email" id="email" required placeholder="you@example.com" />
    <label>パスワード</label>
    <input type="password" id="password" required placeholder="8文字以上" />
    <button type="submit" id="submitBtn">ログイン</button>
  </form>

  <p class="note">無料プランで今すぐ開始 — クレジットカード不要</p>
</div>

<script>
  let mode = 'login';

  function switchTab(m) {
    mode = m;
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', (m === 'login' && i === 0) || (m === 'signup' && i === 1));
    });
    document.getElementById('submitBtn').textContent = m === 'login' ? 'ログイン' : '新規登録';
    document.getElementById('error').style.display = 'none';
  }

  async function handleSubmit(e) {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const btn = document.getElementById('submitBtn');
    const errEl = document.getElementById('error');

    btn.disabled = true;
    btn.textContent = '処理中...';
    errEl.style.display = 'none';

    try {
      const res = await fetch(`/api/auth/${mode}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      });
      const data = await res.json();
      if (!res.ok) {
        errEl.textContent = data.error;
        errEl.style.display = 'block';
        return;
      }
      localStorage.setItem('token', data.token);
      localStorage.setItem('user', JSON.stringify(data.user));
      window.location.href = '/';
    } catch {
      errEl.textContent = 'サーバーに接続できませんでした';
      errEl.style.display = 'block';
    } finally {
      btn.disabled = false;
      btn.textContent = mode === 'login' ? 'ログイン' : '新規登録';
    }
  }
</script>
</body>
</html>
